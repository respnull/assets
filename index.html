<!DOCTYPE html>
<body>
  <h1>Assets inside /main</h1>
  <ul id="fl"></ul>

  <script>
    fetch(`https://api.github.com/repos/respnull/assets/contents/`)
      .then(res => res.json())
      .then(data => {
        const ul = document.getElementById("fl");
        data.forEach(file => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = `https://respnull.github.io/assets/${file.name}`;
          a.textContent = file.name;
          li.appendChild(a);
          ul.appendChild(li);
        });
      })
      .catch(err => console.error(err));
  </script>
</body>
</html>
