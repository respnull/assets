<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assets inside \/main</title>
</head>
<body>
  <h1>Assets</h1>
  <ul id="file-list"></ul>

  <script>
    fetch(`https://api.github.com/repos/respnull/assets/contents/assets`)
      .then(res => res.json())
      .then(data => {
        const ul = document.getElementById("file-list");
        data.forEach(file => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = file.download_url;
          a.textContent = file.name;
          li.appendChild(a);
          ul.appendChild(li);
        });
      })
      .catch(err => console.error(err));
  </script>
</body>
</html>
